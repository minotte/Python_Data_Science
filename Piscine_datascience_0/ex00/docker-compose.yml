version: "3.8"

services:
  postgres:
    image: postgres:15
    container_name: piscineds_postgres
    restart: always
    environment:
      POSTGRES_USER: nminotte
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: piscineds
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: